<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GASPARD.exe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Custom cursor -->
    <div id="cursor"></div>

    <!-- Scene -->
    <div id="scene">
        <img id="scene-image" alt="" decoding="async" fetchpriority="high">
        <div id="hotspots-container"></div>
        <div id="scanlines"></div>
        <div id="vignette"></div>
    </div>

    <!-- Label hint -->
    <div id="label-hint"></div>

    <!-- Back button -->
    <button id="back-btn">[ &#8592; RETOUR ]</button>

    <!-- Bureau overlay -->
    <div id="bureau-overlay">
        <div id="bureau-window">
            <div id="bureau-header">
                <span id="bureau-title">PROJETS_GASPARD/ &mdash;&mdash; C:\USERS\GASPARD&gt;</span>
                <button id="bureau-close">[X]</button>
            </div>
            <div id="bureau-content"></div>
        </div>
    </div>

    <!-- Transition -->
    <div id="transition"></div>

    <!-- iPhone 3GS Overlay -->
    <div id="iphone-overlay">
        <div id="iphone-container">
            <img id="iphone-bg" src="assets/rooms/iphone_3gs.png" alt="iPhone 3GS">
            <div id="ios-screen">
                <div id="ios-statusbar">
                    <span id="ios-carrier">GASPARD</span>
                    <span id="ios-time">00:00</span>
                    <span id="ios-battery">
                        <span class="ios-signal">▪▪▪▪▪</span>
                    </span>
                </div>
                <div id="ios-home">
                    <div id="ios-app-grid"></div>
                </div>
                <div id="ios-dock">
                    <div id="ios-dock-bg"></div>
                    <div id="ios-dock-icons"></div>
                </div>
            </div>
            <button id="iphone-close-btn" onclick="hideIphone()">[ FERMER ]</button>
        </div>
    </div>

    <!-- Phone module -->
    <div id="phone-module" class="is-home">
        <div id="phone-shell" aria-label="Téléphone média narratif">
            <div id="phone-speaker"></div>
            <div id="phone-screen"></div>
            <button id="phone-home-button" type="button" aria-label="Accueil du téléphone"></button>
        </div>
        <div id="phone-bubble" aria-live="polite">
            <p id="phone-bubble-text"></p>
        </div>
        <audio id="ambient-audio" preload="none" loop></audio>
        <audio id="voice-audio" preload="none"></audio>
        <template id="phone-home-template">
            <div class="phone-status">
                <span>GASPARD</span>
                <span>12:00</span>
                <span>▮▮▮</span>
            </div>
            <div class="phone-home">
                <div class="phone-home-title">Carnet</div>
                <div class="phone-home-subtitle">objets · projets · traces</div>
                <button id="ambient-toggle" class="phone-round-button" type="button" aria-label="Lire ou mettre en pause l'ambiance sonore">▶</button>
                <div class="phone-app-grid" aria-hidden="true">
                    <span><strong>✦</strong><em>IA</em></span>
                    <span><strong>▧</strong><em>Photos</em></span>
                    <span><strong>@</strong><em>Contact</em></span>
                    <span><strong>♪</strong><em>Audio</em></span>
                </div>
            </div>
        </template>
    </div>

    <script>
      window.OPENAI_API_KEY = '';
      window.CHAT_API_ENDPOINT = '';
    </script>
    <script src="data.js"></script>
    <script src="game.js"></script>
</body>
</html>
