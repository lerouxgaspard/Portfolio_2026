<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GASPARD.exe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Custom cursor -->
    <div id="cursor"></div>

    <!-- Scene -->
    <div id="scene">
        <img id="scene-image" alt="" decoding="async" fetchpriority="high">
        <div id="hotspots-container"></div>
        <div id="scanlines"></div>
        <div id="vignette"></div>
    </div>

    <!-- Label hint -->
    <div id="label-hint"></div>

    <!-- Back button -->
    <button id="back-btn">[ &#8592; RETOUR ]</button>

    <!-- Bureau overlay -->
    <div id="bureau-overlay">
        <div id="bureau-window">
            <div id="bureau-header">
                <span id="bureau-title">PROJETS_GASPARD/ &mdash;&mdash; C:\USERS\GASPARD&gt;</span>
                <button id="bureau-close">[X]</button>
            </div>
            <div id="bureau-content"></div>
        </div>
    </div>

    <!-- Transition -->
    <div id="transition"></div>

    <!-- Phone module -->
    <div id="phone-module" class="is-home">
        <div id="phone-shell" aria-label="Téléphone média narratif">
            <div id="phone-speaker"></div>
            <div id="phone-screen"></div>
            <div id="phone-home-button" aria-hidden="true"></div>
        </div>
        <div id="phone-bubble" aria-live="polite">
            <p id="phone-bubble-text"></p>
        </div>
        <audio id="ambient-audio" preload="none" loop></audio>
        <audio id="voice-audio" preload="none"></audio>
        <template id="phone-home-template">
            <div class="phone-status">
                <span>3G</span>
                <span>9:41 AM</span>
                <span>100%</span>
            </div>
            <div class="phone-home">
                <button id="phone-minimize" class="phone-close-button phone-home-minimize" type="button">MIN</button>
                <div class="phone-home-title">GASPARD.fm</div>
                <div class="phone-home-subtitle">Aucun objet sélectionné</div>
                <button id="ambient-toggle" class="phone-round-button" type="button">PLAY</button>
                <div class="phone-app-grid" aria-hidden="true">
                    <span>MSG</span>
                    <span>PHOTOS</span>
                    <span>NOTES</span>
                    <span>VOICE</span>
                </div>
            </div>
        </template>
    </div>

    <script>
      window.OPENAI_API_KEY = '';
      window.CHAT_API_ENDPOINT = '';
    </script>
    <script src="data.js"></script>
    <script src="game.js"></script>
</body>
</html>
