<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GASPARD.exe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Custom cursor -->
    <div id="cursor"></div>

    <!-- Scene -->
    <div id="scene">
        <img id="scene-image" alt="" decoding="async" fetchpriority="high">
        <div id="hotspots-container"></div>
        <div id="scanlines"></div>
        <div id="vignette"></div>
    </div>

    <!-- Label hint -->
    <div id="label-hint"></div>

    <!-- Back button -->
    <button id="back-btn">[ &#8592; RETOUR ]</button>

    <!-- Bureau overlay -->
    <div id="bureau-overlay">
        <div id="bureau-window">
            <div id="bureau-header">
                <span id="bureau-title">PROJETS_GASPARD/ &mdash;&mdash; C:\USERS\GASPARD&gt;</span>
                <button id="bureau-close">[X]</button>
            </div>
            <div id="bureau-content"></div>
        </div>
    </div>

    <!-- Transition -->
    <div id="transition"></div>

    <!-- iPhone 3GS Overlay -->
    <div id="iphone-overlay">
        <div id="iphone-container">
            <img id="iphone-bg" src="assets/rooms/iphone_3gs.png" alt="iPhone 3GS">
            <div id="ios-screen">
                <div id="ios-statusbar">
                    <span id="ios-carrier">GASPARD</span>
                    <span id="ios-time">00:00</span>
                    <span id="ios-battery">
                        <span class="ios-signal">▪▪▪▪▪</span>
                    </span>
                </div>
                <div id="ios-home">
                    <div id="ios-app-grid"></div>
                </div>
                <div id="ios-dock">
                    <div id="ios-dock-bg"></div>
                    <div id="ios-dock-icons"></div>
                </div>
            </div>
            <button id="iphone-close-btn" onclick="hideIphone()">[ FERMER ]</button>
        </div>
    </div>

    <script>
      window.OPENAI_API_KEY = '';
      window.CHAT_API_ENDPOINT = '';
    </script>
    <script src="data.js"></script>
    <script src="game.js"></script>
</body>
</html>
